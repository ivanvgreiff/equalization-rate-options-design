# Core analysis parameters
# All values are sweep-able; these are sensible defaults.

horizons:
  - name: "7d"
    intervals: 21       # 7 * 24 / 8
    days: 7
  - name: "30d"
    intervals: 90       # 30 * 24 / 8
    days: 30
  - name: "90d"
    intervals: 270      # 90 * 24 / 8
    days: 90

sampling:
  interval_hours: 8
  dt_years: 0.00091324  # 8 / (24 * 365)

risk_metrics:
  var_alpha: 0.01       # 99% VaR / CVaR
  cvar_alpha: 0.01

premium:
  risk_load_lambda: 0.35        # CVaR loading multiplier
  target_sharpe: 0.75           # seller target Sharpe
  cost_of_capital_annual: 0.12  # 12% annualized (DeFi opportunity cost)

swap_benchmark:
  lookback_intervals: 90              # 30d trailing window
  primary_method: "ewma"
  secondary_method: "mean"
  methods: ["ewma", "mean"]
  ewma_halflife_intervals: 45         # half the lookback

# Calibration settings (Phase 5)
calibration:
  primary_venue: "bybit"
  asl_deductible_quantile_baseline: 0.90
  asl_deductible_quantile_sensitivity: 0.95
  daf_baseline:
    threshold_b: 0.0001
    streak_m: 3
  daf_sensitivity:
    threshold_b: 0.0001
    streak_m: 2
  floor_deductibles: [0.0, 0.0001, 0.0003]
  conditional_loss_quantiles: [0.25, 0.50, 0.75, 0.90, 0.95, 0.99]
  lambda_quantiles: [0.50, 0.75, 0.80, 0.85, 0.90, 0.95, 0.99]
